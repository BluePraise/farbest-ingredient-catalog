# .github/workflows/deploy-staging.yml
name: Deploy to Staging
on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: >-
            -avzr --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='node_modules'
            --exclude='assets/src'
            --exclude='build'
            --exclude='package.json'
            --exclude='package-lock.json'
            --exclude='deploy.sh'
            --exclude='*.sql'
            --exclude='*.md'
            --exclude='.DS_Store'
          path: ./
          remote_path: /home/customer/www/farbest.navesinkwebsolutions.com/public_html/wp-content/plugins/farbest-product-catalog/
          remote_host: ${{ secrets.STAGING_HOST }}
          remote_user: ${{ secrets.STAGING_USER }}
          remote_key: ${{ secrets.STAGING_SSH_KEY }}
          remote_port: 18765